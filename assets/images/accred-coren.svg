<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 60">
  <!-- Green rounded rectangle — matches real COREN badge -->
  <rect x="0" y="0" width="110" height="60" rx="6" fill="#1a7a2e"/>
  <!-- Inner border -->
  <rect x="3" y="3" width="104" height="54" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <!-- Top thin accent line -->
  <line x1="12" y1="13" x2="98" y2="13" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  <!-- Bottom thin accent line -->
  <line x1="12" y1="47" x2="98" y2="47" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  <!-- COREN bold text -->
  <text x="55" y="38" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="28" font-weight="900" fill="#ffffff" letter-spacing="4">COREN</text>
  <!-- Subtitle -->
  <text x="55" y="53" text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="5" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="1">COUNCIL FOR REGULATION OF ENGINEERING IN NIGERIA</text>
</svg>
