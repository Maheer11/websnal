<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="48" fill="#fefefe" stroke="#c8a84b" stroke-width="3.5"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#c8a84b" stroke-width="1"/>
  <circle cx="50" cy="50" r="36" fill="#f5f0e0"/>
  <!-- Curved text paths -->
  <path id="acon-top" d="M 9,50 a41,41 0 0,1 82,0" fill="none"/>
  <path id="acon-bot" d="M 91,50 a41,41 0 0,1 -82,0" fill="none"/>
  <text font-family="Georgia, serif" font-size="6.5" font-weight="700" fill="#1b3a6b" letter-spacing="1">
    <textPath href="#acon-top" startOffset="6%">ASSOCIATION OF CONSULTING ENGRS</textPath>
  </text>
  <text font-family="Georgia, serif" font-size="6" font-weight="600" fill="#1b3a6b" letter-spacing="1">
    <textPath href="#acon-bot" startOffset="22%">OF NIGERIA</textPath>
  </text>
  <!-- Compass/tools icon -->
  <circle cx="50" cy="44" r="12" fill="none" stroke="#c8a84b" stroke-width="1.5"/>
  <line x1="50" y1="32" x2="50" y2="37" stroke="#1b3a6b" stroke-width="2"/>
  <line x1="50" y1="51" x2="50" y2="56" stroke="#1b3a6b" stroke-width="2"/>
  <line x1="38" y1="44" x2="43" y2="44" stroke="#1b3a6b" stroke-width="2"/>
  <line x1="57" y1="44" x2="62" y2="44" stroke="#1b3a6b" stroke-width="2"/>
  <!-- Compass needle -->
  <polygon points="50,36 52,44 50,52 48,44" fill="#c8a84b"/>
  <circle cx="50" cy="44" r="2.5" fill="#1b3a6b"/>
  <!-- ACON text -->
  <text x="50" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" font-weight="900" fill="#1b3a6b" letter-spacing="1.5">ACON</text>
</svg>
