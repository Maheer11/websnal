  ═══════════════════════════════ -->
  <!-- Building 1 — tallest, leftmost -->
  <rect x="96" y="4" width="18" height="114" fill="#1b3a6b"/>
  <!-- windows -->
  <rect x="99" y="10" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="106" y="10" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="99" y="18" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="106" y="18" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="99" y="26" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="106" y="26" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="99" y="34" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="106" y="34" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="99" y="42" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="106" y="42" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="99" y="50" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="106" y="50" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="99" y="58" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>
  <rect x="106" y="58" width="5" height="4" rx="0.5" fill="white" opacity="0.45"/>

  <!-- Building 2 — medium, centre-left -->
  <rect x="117" y="18" width="16" height="100" fill="#1b3a6b"/>
  <rect x="120" y="24" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="126" y="24" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="120" y="32" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="126" y="32" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="120" y="40" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="126" y="40" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="120" y="48" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="126" y="48" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="120" y="56" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="126" y="56" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="120" y="64" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="126" y="64" width="4" height="4" rx="0.5" fill="white" opacity="0.4"/>

  <!-- ═══════════════════════════════
       CRANE  (orange)
  ═══════════════════════════════ -->
  <!-- Main tower/mast with lattice look -->
  <rect x="156" y="4" width="5" height="114" fill="#e05a2b"/>
  <!-- Mast cross-bracing -->
  <line x1="156" y1="14"  x2="161" y2="24"  stroke="#e05a2b" stroke-width="1.2"/>
  <line x1="161" y1="14"  x2="156" y2="24"  stroke="#e05a2b" stroke-width="1.2"/>
  <line x1="156" y1="34"  x2="161" y2="44"  stroke="#e05a2b" stroke-width="1.2"/>
  <line x1="161" y1="34"  x2="156" y2="44"  stroke="#e05a2b" stroke-width="1.2"/>
  <line x1="156" y1="54"  x2="161" y2="64"  stroke="#e05a2b" stroke-width="1.2"/>
  <line x1="161" y1="54"  x2="156" y2="64"  stroke="#e05a2b" stroke-width="1.2"/>
  <line x1="156" y1="74"  x2="161" y2="84"  stroke="#e05a2b" stroke-width="1.2"/>
  <line x1="161" y1="74"  x2="156" y2="84"  stroke="#e05a2b" stroke-width="1.2"/>
  <!-- Jib arm (long horizontal) -->
  <rect x="108" y="1" width="74" height="5" rx="1.5" fill="#e05a2b"/>
  <!-- Diagonal stay from mast top to jib tip -->
  <line x1="158.5" y1="4" x2="182" y2="6" stroke="#e05a2b" stroke-width="2"/>
  <!-- Counter-jib (short, right) -->
  <rect x="161" y="1" width="22" height="4" rx="1" fill="#e05a2b"/>
  <!-- Crane cabin -->
  <rect x="152" y="5" width="12" height="8" rx="1" fill="#1b3a6b"/>
  <!-- Hook cable -->
  <line x1="130" y1="6" x2="130" y2="28" stroke="#e05a2b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M127,26 Q130,32 133,26" stroke="#e05a2b" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ═══════════════════════════════
       MC MONOGRAM
  ═══════════════════════════════ -->
  <!-- C — large orange arc, centre (165,133) outer r=52 inner r=37, gap ±45° -->
  <path
    d="M 201.8,96.2
       A 52,52 0 1 0 201.8,169.8
       L 188.2,157.8
       A 37,37 0 1 1 188.2,108.2
       Z"
    fill="#e05a2b"
  />

  <!-- M — right edge touches inner-left wall of C (x = 165-37 = 128)
       font-size bumped to 78 for clear visibility -->
  <text
    x="126" y="160"
    text-anchor="end"
    font-family="'Barlow Condensed', Arial Black, Impact, sans-serif"
    font-size="78"
    font-weight="900"
    fill="#1b3a6b"
  >M</text>


</svg>
