<svg xmlns="http://www.w3.org/2000/svg" viewBox="55 0 200 225">

  <!-- ═══════════════════════════════
       GEAR RING  (orange, 12 teeth)
       centre (150,130) outer=88 inner=72
  ═══════════════════════════════ -->
  <polygon fill="#e05a2b" points="
    135,59.6  142.3,42.3  157.7,42.3  165,59.6
    172.3,61.5  187.2,50.3  200.5,57.9  198.2,76.5
    203.5,81.8  222.1,79.5  229.8,92.8  218.5,107.8
    220.4,115   237.7,122.3  237.7,137.7  220.4,145
    218.5,152.3  229.8,167.2  222.1,180.5  203.5,178.2
    198.2,183.5  200.5,202.1  187.2,209.8  172.3,198.5
    165,200.4  157.7,217.7  142.3,217.7  135,200.4
    127.7,198.5  112.8,209.8   99.5,202.1  101.8,183.5
     96.5,178.2   77.9,180.5   70.2,167.2   81.5,152.3
     79.6,145     62.3,137.7   62.3,122.3   79.6,115
     81.5,107.8   70.2,92.8    77.9,79.5    96.5,81.8
    101.8,76.5   99.5,57.9   112.8,50.3  127.7,61.5
  "/>

  <!-- Inner white circle (creates the ring / hub) -->
  <circle cx="150" cy="130" r="66" fill="#ffffff"/>

