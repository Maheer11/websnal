<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer ring — dark green/teal matching image -->
  <circle cx="50" cy="50" r="48" fill="#1a4a2e" stroke="#c8a84b" stroke-width="3"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#c8a84b" stroke-width="0.8"/>
  <!-- Text paths -->
  <path id="niob-top" d="M 9,50 a41,41 0 0,1 82,0" fill="none"/>
  <path id="niob-bot" d="M 91,50 a41,41 0 0,1 -82,0" fill="none"/>
  <text font-family="Georgia, serif" font-size="6.8" font-weight="700" fill="#c8a84b" letter-spacing="1.2">
    <textPath href="#niob-top" startOffset="3%">THE NIGERIAN INSTITUTE OF BUILDING</textPath>
  </text>
  <text font-family="Georgia, serif" font-size="6" font-weight="600" fill="#c8a84b" letter-spacing="1.5">
    <textPath href="#niob-bot" startOffset="28%">· 1963 ·</textPath>
  </text>
  <!-- Orange/brown pyramid — matches image -->
  <polygon points="50,26 34,52 66,52" fill="#c8713a" stroke="#a85a2a" stroke-width="1"/>
  <!-- Pyramid detail lines -->
  <line x1="50" y1="26" x2="42" y2="52" stroke="#a85a2a" stroke-width="0.8"/>
  <line x1="50" y1="26" x2="58" y2="52" stroke="#a85a2a" stroke-width="0.8"/>
  <line x1="37" y1="45" x2="63" y2="45" stroke="#a85a2a" stroke-width="0.8"/>
  <!-- NIOB text -->
  <text x="50" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="900" fill="#c8a84b" letter-spacing="2">NIOB</text>
</svg>
