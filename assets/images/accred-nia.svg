<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="48" fill="#1b3a6b" stroke="#c8a84b" stroke-width="3"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#c8a84b" stroke-width="0.7"/>
  <!-- Curved text path top -->
  <path id="nia-arc-top" d="M 9,50 a41,41 0 0,1 82,0" fill="none"/>
  <path id="nia-arc-bot" d="M 91,50 a41,41 0 0,1 -82,0" fill="none"/>
  <text font-family="Georgia, serif" font-size="7.2" font-weight="700" fill="#c8a84b" letter-spacing="1.4">
    <textPath href="#nia-arc-top" startOffset="4%">NIGERIAN INSTITUTE OF ARCHITECTS</textPath>
  </text>
  <text font-family="Georgia, serif" font-size="6.5" font-weight="600" fill="#c8a84b" letter-spacing="1">
    <textPath href="#nia-arc-bot" startOffset="28%">· 1960 ·</textPath>
  </text>
  <!-- Classical figure (architect with scroll) -->
  <!-- Head -->
  <circle cx="50" cy="31" r="5" fill="#e8d5a0"/>
  <!-- Body/robe -->
  <path d="M43,36 Q50,34 57,36 L59,54 Q50,57 41,54 Z" fill="#e8d5a0"/>
  <!-- Robe folds -->
  <line x1="46" y1="37" x2="44" y2="54" stroke="#c8a84b" stroke-width="0.8"/>
  <line x1="50" y1="36" x2="50" y2="55" stroke="#c8a84b" stroke-width="0.8"/>
  <line x1="54" y1="37" x2="56" y2="54" stroke="#c8a84b" stroke-width="0.8"/>
  <!-- Scroll in hand -->
  <rect x="55" y="40" width="7" height="5" rx="1" fill="#ffffff" stroke="#c8a84b" stroke-width="0.6"/>
  <line x1="55" y1="42" x2="62" y2="42" stroke="#c8a84b" stroke-width="0.5"/>
  <line x1="55" y1="43.5" x2="62" y2="43.5" stroke="#c8a84b" stroke-width="0.5"/>
  <!-- NIA text -->
  <text x="50" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="900" fill="#c8a84b" letter-spacing="2">NIA</text>
</svg>
